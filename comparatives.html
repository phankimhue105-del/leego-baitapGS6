 <body data-template-id="__page-root" class="min-h-screen bg-slate-50">

  <script>
const PASSWORD = "1205";

const part1Questions = [
  { q: "She is ___ than her sister.", options: ["more tall", "taller", "tallest", "most tall"], correct: 1, explain: "✅ 'Tall' là tính từ ngắn (1 âm tiết), ta thêm -er → taller.\n❌ 'more tall' sai vì không dùng 'more' với tính từ ngắn.\n❌ 'tallest' là so sánh nhất, không phải so sánh hơn.\n📝 Cấu trúc: S + be + adj-er + than + N." },
  { q: "This book is ___ than that one.", options: ["interestinger", "more interesting", "most interesting", "interesting"], correct: 1, explain: "✅ 'Interesting' là tính từ dài (3 âm tiết), dùng more + adj → more interesting.\n❌ 'interestinger' không tồn tại.\n📝 Quy tắc: Tính từ có 3 âm tiết trở lên dùng more...than." },
  { q: "He runs ___ than me.", options: ["faster", "more fast", "fastest", "fast"], correct: 0, explain: "✅ 'Fast' là tính từ/trạng từ ngắn → thêm -er → faster.\n❌ 'more fast' sai vì fast là từ ngắn.\n📝 Cấu trúc: S + V + adv-er + than + N." },
  { q: "My bag is ___ than yours.", options: ["heavyer", "more heavy", "heavier", "heaviest"], correct: 2, explain: "✅ 'Heavy' kết thúc bằng -y → đổi y thành i + er → heavier.\n❌ 'heavyer' sai chính tả.\n❌ 'more heavy' không đúng quy tắc.\n📝 Quy tắc: Tính từ 2 âm tiết tận cùng -y → đổi y → ier." },
  { q: "Today is ___ than yesterday.", options: ["hotter", "hoter", "more hot", "hottest"], correct: 0, explain: "✅ 'Hot' là tính từ 1 âm tiết, kết thúc phụ âm + nguyên âm + phụ âm → gấp đôi phụ âm cuối + er → hotter.\n❌ 'hoter' thiếu gấp đôi chữ t.\n📝 Quy tắc: CVC → gấp đôi phụ âm cuối + er." },
  { q: "This test is ___ than the last one.", options: ["worse", "badder", "more bad", "baddest"], correct: 0, explain: "✅ 'Bad' là tính từ bất quy tắc: bad → worse → worst.\n❌ 'badder', 'more bad' không tồn tại.\n📝 Ghi nhớ: good→better, bad→worse, far→farther/further." },
  { q: "My English is ___ than it was last year.", options: ["more better", "gooder", "better", "best"], correct: 2, explain: "✅ 'Good' là tính từ bất quy tắc: good → better → best.\nCông việc tiếng Anh của tôi tốt hơn năm ngoài.\n❌ 'more better', 'gooder' không tồn tại.\n📝 Quy tắc: Không bao giờ dùng more + tính từ bất quy tắc." },
  { q: "Living in the city is ___ more expensive than living in the countryside.", options: ["much", "very", "too", "most"], correct: 0, explain: "✅ Dùng much/far/a lot trước so sánh hơn để nhấn mạnh.\n❌ 'very' không đứng trước comparative.\n❌ 'too' nghĩa là 'quá', không dùng ở đây.\n📝 Cấu trúc: much/far/a lot + comparative." },
  { q: "The weather today is ___ than last week.", options: ["more cold", "colder", "coldest", "most cold"], correct: 1, explain: "✅ 'Cold' là tính từ ngắn (1 âm tiết), thêm -er → colder.\nThời tiết hôm nay lạnh hơn tuần trước.\n❌ 'more cold' sai vì không dùng 'more' với tính từ ngắn.\n❌ 'coldest' là so sánh nhất, không phải so sánh hơn.\n📝 Cấu trúc: S + be + adj-er + than + N." },
  { q: "His job is ___ than mine.", options: ["more important", "importanter", "most important", "more importance"], correct: 0, explain: "✅ 'Important' là tính từ dài (4 âm tiết), dùng more + adj → more important.\nCông việc của anh ấy quan trọng hơn của tôi.\n❌ 'importanter' không tồn tại.\n📝 Tính từ 3 âm tiết trở lên: more + adj + than." },
  { q: "She speaks English ___ than before.", options: ["more fluently", "fluently", "most fluently", "fluentlier"], correct: 0, explain: "✅ 'Fluently' là trạng từ dài → dùng more + adv → more fluently.\n❌ 'fluentlier' không tồn tại.\n📝 Trạng từ kết thúc -ly → dùng more...than." },
  { q: "His house is ___ from school than mine.", options: ["farer", "farther", "more far", "farest"], correct: 1, explain: "✅ 'Far' là tính từ bất quy tắc: far → farther/further.\n❌ 'farer', 'more far' không đúng.\n📝 Farther thường dùng cho khoảng cách vật lý, further cho nghĩa trừu tượng." }
];

const part2Questions = [
  { words: ["Tom", "is", "taller", "than", "Jerry."], answer: "Tom is taller than Jerry.", explain: "📝 Cấu trúc so sánh hơn với tính từ ngắn: S + be + adj-er + than + N.\nTom cao hơn Jerry.\n✅ Thứ tự từ rõ ràng: Tom là người cao hơn, Jerry là người được so sánh." },
  { words: ["more", "This", "expensive", "is", "than", "that", "one."], answer: "This is more expensive than that one.", explain: "📝 Tính từ dài (expensive - 4 âm tiết): more + adj + than.\nCái này đắt hơn cái kia." },
  { words: ["This", "box", "is", "much", "heavier", "than", "that", "one."], answer: "This box is much heavier than that one.", explain: "📝 Much + comparative để nhấn mạnh mức độ.\nCái hộp này nặng hơn cái kia nhiều." },
  { words: ["better", "is", "Her", "than", "cooking", "mine", "."], answer: "Her cooking is better than mine.", explain: "📝 Good → better (bất quy tắc). Món ăn của cô ấy ngon hơn của tôi." },
  { words: ["The", "dog", "is", "bigger", "than", "the", "cat", "."], answer: "The dog is bigger than the cat.", explain: "📝 Cấu trúc so sánh hơn với tính từ ngắn: S + be + adj-er + than + N.\nChú chó lớn hơn con mèo.\n✅ Big (1 âm tiết) → gấp đôi g + er → bigger." },
  { words: ["slower", "This", "car", "is", "than", "that", "one."], answer: "This car is slower than that one.", explain: "📝 Cấu trúc so sánh hơn với tính từ ngắn: S + be + adj-er + than + N.\nChiếc xe này chậm hơn chiếc kia.\n✅ Slow (1 âm tiết) → thêm -er → slower." },
  { words: ["worse", "His", "is", "handwriting", "than", "hers", "."], answer: "His handwriting is worse than hers.", explain: "📝 Bad → worse (bất quy tắc). Chữ viết của anh ấy xấu hơn của cô ấy." },
  { words: ["is", "lighter", "This", "that", "than", "bag", "one."], answer: "This bag is lighter than that one.", explain: "📝 Cấu trúc so sánh hơn với tính từ ngắn: S + be + adj-er + than + N.\nCái túi này nhẹ hơn cái kia.\n✅ Light (1 âm tiết) → thêm -er → lighter." },
  { words: ["The", "book", "is", "newer", "than", "that", "one."], answer: "The book is newer than that one.", explain: "📝 Cấu trúc so sánh hơn với tính từ ngắn: S + be + adj-er + than + N.\nCuốn sách này mới hơn cuốn kia.\n✅ New (1 âm tiết) → thêm -er → newer." },
];

let currentQuestion = 0;
let score = 0;
let answers = [];
let shuffledPart1, shuffledPart2;

function shuffle(arr) { const a = [...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function playTone(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    if(type==='correct'){osc.frequency.value=523;osc.type='sine';gain.gain.value=0.3;osc.start();osc.frequency.setValueAtTime(659,ctx.currentTime+0.15);osc.frequency.setValueAtTime(784,ctx.currentTime+0.3);osc.stop(ctx.currentTime+0.5);}
    else if(type==='wrong'){osc.frequency.value=200;osc.type='sawtooth';gain.gain.value=0.2;osc.start();osc.stop(ctx.currentTime+0.4);}
    else{osc.frequency.value=440;osc.type='sine';gain.gain.value=0.2;osc.start();osc.frequency.setValueAtTime(554,ctx.currentTime+0.3);osc.frequency.setValueAtTime(659,ctx.currentTime+0.6);osc.frequency.setValueAtTime(880,ctx.currentTime+0.9);osc.stop(ctx.currentTime+1.2);}
  }catch(e){}
}

function render() { document.getElementById('app').innerHTML = ''; }

function showCover() {
  document.getElementById('app').innerHTML = `
    <div class="fade-in text-center py-12">
      <h1 class="text-4xl md:text-6xl font-bold text-blue-800 mb-8">COMPARATIVES</h1>
      <div class="max-w-xs mx-auto space-y-4">
        <input id="pwd" type="password" placeholder="Nhập mật khẩu..." class="w-full px-4 py-3 border-2 border-blue-200 rounded-xl text-center text-lg focus:outline-none focus:border-blue-500">
        <p id="pwd-err" class="text-red-500 text-sm hidden">Incorrect password.</p>
        <button onclick="checkPassword()" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl text-lg shadow-lg">Start Quiz</button>
      </div>
    </div>`;
}

function checkPassword() {
  const val = document.getElementById('pwd').value;
  if(val === PASSWORD) { startQuiz(); }
  else { document.getElementById('pwd-err').classList.remove('hidden'); }
}

function startQuiz() {
  score = 0; answers = []; currentQuestion = 0;
  shuffledPart1 = shuffle(part1Questions);
  shuffledPart2 = shuffle(part2Questions);
  showQuestion();
}

function showQuestion() {
  if(currentQuestion < 12) showMCQ();
  else if(currentQuestion < 20) showBuild();
  else showResults();
}

function showMCQ() {
  const q = shuffledPart1[currentQuestion];
  const shuffledOpts = q.options.map((o,i)=>({text:o,idx:i}));
  // shuffle options
  for(let i=shuffledOpts.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[shuffledOpts[i],shuffledOpts[j]]=[shuffledOpts[j],shuffledOpts[i]];}
  
  const part = currentQuestion < 12 ? 'Part 1: Multiple Choice' : 'Part 2';
  document.getElementById('app').innerHTML = `
    <div class="fade-in">
      <div class="flex justify-between items-center mb-4">
        <span class="text-sm font-medium text-blue-600">${part}</span>
        <span class="text-sm font-medium text-slate-500">Question ${currentQuestion+1}/20</span>
      </div>
      <div class="bg-white rounded-2xl shadow-lg p-6 md:p-8">
        <p class="text-lg md:text-xl font-semibold text-slate-800 mb-6">${q.q}</p>
        <div class="space-y-3" id="opts">
          ${shuffledOpts.map((o,i)=>`<button onclick="checkMCQ(${o.idx})" class="w-full text-left px-5 py-3 rounded-xl border-2 border-slate-200 hover:border-blue-400 hover:bg-blue-50 font-medium transition">${String.fromCharCode(65+i)}. ${o.text}</button>`).join('')}
        </div>
        <div id="feedback" class="mt-6 hidden"></div>
      </div>
    </div>`;
}

function checkMCQ(idx) {
  const q = shuffledPart1[currentQuestion];
  const correct = idx === q.correct;
  if(correct) score++;
  answers.push(correct);
  document.querySelectorAll('#opts button').forEach(b=>{ b.disabled=true; b.classList.add('pointer-events-none'); });
  playTone(correct?'correct':'wrong');
  const fb = document.getElementById('feedback');
  fb.classList.remove('hidden');
  fb.innerHTML = `
    <div class="p-4 rounded-xl ${correct?'bg-green-50 border border-green-200':'bg-red-50 border border-red-200'}">
      <p class="font-bold ${correct?'text-green-700':'text-red-700'} mb-2">${correct?'✅ Chính xác':'❌ Chưa chính xác'}</p>
      <p class="text-sm text-slate-700 whitespace-pre-line">${q.explain}</p>
    </div>
    <button onclick="nextQ()" class="mt-4 w-full py-3 bg-blue-600 text-white font-bold rounded-xl">Tiếp theo →</button>`;
}

function nextQ() { currentQuestion++; showQuestion(); }

// Part 2: Sentence building
let buildSelected = [];
let buildWordsState = [];

function showBuild() {
  const q = shuffledPart2[currentQuestion - 12];
  buildSelected = [];
  buildWordsState = shuffle(q.words).map((w,i)=>({text:w,id:i,used:false}));
  
  document.getElementById('app').innerHTML = `
    <div class="fade-in">
      <div class="flex justify-between items-center mb-4">
        <span class="text-sm font-medium text-blue-600">Part 2: Build the Sentence</span>
        <span class="text-sm font-medium text-slate-500">Question ${currentQuestion+1}/20</span>
      </div>
      <div class="bg-white rounded-2xl shadow-lg p-6 md:p-8">
        <p class="text-lg font-semibold text-slate-800 mb-4">Sắp xếp các từ thành câu hoàn chỉnh:</p>
        <div id="sentence-area" class="min-h-[3rem] p-3 border-2 border-dashed border-blue-300 rounded-xl mb-4 flex flex-wrap gap-2 items-center"></div>
        <div id="word-pool" class="flex flex-wrap gap-2 mb-6"></div>
        <div class="flex gap-2 flex-wrap">
          <button onclick="undoWord()" class="px-4 py-2 bg-yellow-100 text-yellow-800 font-medium rounded-lg border border-yellow-300">Undo</button>
          <button onclick="clearWords()" class="px-4 py-2 bg-slate-100 text-slate-700 font-medium rounded-lg border border-slate-300">Clear</button>
          <button onclick="checkBuild()" class="px-4 py-2 bg-blue-600 text-white font-bold rounded-lg">Check Answer</button>
        </div>
        <div id="feedback" class="mt-6 hidden"></div>
      </div>
    </div>`;
  renderBuild();
}

function renderBuild() {
  const pool = document.getElementById('word-pool');
  const area = document.getElementById('sentence-area');
  pool.innerHTML = buildWordsState.map(w=>`<button onclick="selectWord(${w.id})" class="word-box px-3 py-2 bg-blue-100 text-blue-800 font-medium rounded-lg border border-blue-300 ${w.used?'used':''}">${w.text}</button>`).join('');
  area.innerHTML = buildSelected.length ? buildSelected.map(w=>`<span class="px-3 py-1 bg-blue-600 text-white rounded-lg font-medium">${w}</span>`).join('') : '<span class="text-slate-400 italic">Nhấn vào các từ bên dưới...</span>';
}

function selectWord(id) {
  const w = buildWordsState.find(x=>x.id===id);
  if(w && !w.used) { w.used=true; buildSelected.push(w.text); renderBuild(); }
}

function undoWord() {
  if(buildSelected.length===0) return;
  const last = buildSelected.pop();
  const w = [...buildWordsState].reverse().find(x=>x.text===last&&x.used);
  if(w) w.used=false;
  renderBuild();
}

function clearWords() {
  buildSelected=[]; buildWordsState.forEach(w=>w.used=false); renderBuild();
}

function checkBuild() {
  const q = shuffledPart2[currentQuestion-12];
  const userAnswer = buildSelected.join(' ').replace(/\s+([.,!?])/g,'$1');
  const correct = userAnswer === q.answer;
  if(correct) score++;
  answers.push(correct);
  playTone(correct?'correct':'wrong');
  document.getElementById('feedback').classList.remove('hidden');
  document.getElementById('feedback').innerHTML = `
    <div class="p-4 rounded-xl ${correct?'bg-green-50 border border-green-200':'bg-red-50 border border-red-200'}">
      <p class="font-bold ${correct?'text-green-700':'text-red-700'} mb-2">${correct?'✅ Chính xác':'❌ Chưa chính xác'}</p>
      <p class="text-sm text-slate-800 font-medium mb-1">Đáp án: ${q.answer}</p>
      <p class="text-sm text-slate-700 whitespace-pre-line">${q.explain}</p>
    </div>
    <button onclick="nextQ()" class="mt-4 w-full py-3 bg-blue-600 text-white font-bold rounded-xl">Tiếp theo →</button>`;
  document.querySelectorAll('#word-pool button, button[onclick^="undo"], button[onclick^="clear"], button[onclick^="check"]').forEach(b=>b.disabled=true);
}

function showResults() {
  playTone('complete');
  const pct = Math.round(score/20*100);
  let level, msg;
  if(pct>=90){level='🏆 Excellent';msg='Xuất sắc! Bạn nắm rất vững kiến thức so sánh hơn!';}
  else if(pct>=70){level='👍 Good';msg='Tốt lắm! Bạn hiểu khá tốt về comparatives.';}
  else if(pct>=50){level='📚 Fair';msg='Khá ổn! Hãy ôn lại một số quy tắc nhé.';}
  else{level='💪 Need More Practice';msg='Cần luyện tập thêm. Đừng nản, hãy thử lại!';}
  
  document.getElementById('app').innerHTML = `
    <div class="fade-in text-center py-8">
      <h2 class="text-3xl font-bold text-blue-800 mb-6">Quiz Completed! 🎉</h2>
      <div class="bg-white rounded-2xl shadow-lg p-8 max-w-sm mx-auto mb-6">
        <p class="text-5xl font-bold text-blue-600 mb-2">${score}/20</p>
        <p class="text-slate-600 mb-4">${pct}%</p>
        <div class="text-left space-y-2 text-sm">
          <p>✅ Correct: <strong>${score}</strong></p>
          <p>❌ Incorrect: <strong>${20-score}</strong></p>
        </div>
        <div class="mt-4 p-3 rounded-xl bg-blue-50">
          <p class="font-bold text-blue-800">${level}</p>
          <p class="text-sm text-slate-600 mt-1">${msg}</p>
        </div>
      </div>
      <button onclick="showCover()" class="px-8 py-3 bg-red-500 hover:bg-red-600 text-white font-bold rounded-xl text-lg shadow-lg">Làm lại</button>
    </div>`;
}

showCover();
</script>
